<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'] },
        colors: {
          brand: {
            50:'#f0f9f4',100:'#dcf0e3',200:'#bbe1c9',300:'#8ecca8',
            400:'#5cb082',500:'#2f9761',600:'#1f7b4b',700:'#19613c',
            800:'#164e32',900:'#12402a'
          }
        },
        boxShadow: {
          soft: '0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06)',
          pop: '0 10px 30px -8px rgba(15,23,42,.15), 0 4px 10px -4px rgba(15,23,42,.08)'

<style>
  html,body{font-family:'Inter',sans-serif;background:#f6f7f9;color:#0f172a;}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#9ca3af}
  .no-scrollbar::-webkit-scrollbar{display:none}
  .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}

  /* Tooltip */
  [data-tip]{position:relative}
  [data-tip]:hover::after{
    content:attr(data-tip);
    position:absolute; left:50%; top:calc(100% + 6px); transform:translateX(-50%);
    background:#0f172a; color:#fff; font-size:11px; padding:4px 8px; border-radius:6px;
    white-space:nowrap; z-index:80; pointer-events:none;
  }
  [data-tip-right]:hover::after{
    content:attr(data-tip-right);
    position:absolute; left:calc(100% + 8px); top:50%; transform:translateY(-50%);
    background:#0f172a; color:#fff; font-size:11px; padding:4px 8px; border-radius:6px;
    white-space:nowrap; z-index:80; pointer-events:none;
  }

  .menu-card{transition:all .18s ease}
  .menu-card:hover{transform:translateY(-2px); box-shadow:0 10px 24px -12px rgba(15,23,42,.18)}
  .menu-card.disabled{opacity:.55; filter:grayscale(.4); cursor:not-allowed}
  .menu-card.disabled:hover{transform:none;box-shadow:none}

  .chip-active{background:#0f172a;color:#fff}
  .fade-in{animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .pulse-dot::before{
    content:''; position:absolute; inset:-4px; border-radius:9999px;
    background:currentColor; opacity:.35; animation:pulseRing 1.6s ease-out infinite;
  }
  @keyframes pulseRing{0%{transform:scale(.6);opacity:.5}100%{transform:scale(1.6);opacity:0}}

  /* Product visual gradients */
  .grad-1{background:linear-gradient(135deg,#f4a261,#e76f51)}
  .grad-2{background:linear-gradient(135deg,#d6a67a,#8b5a2b)}
  .grad-3{background:linear-gradient(135deg,#e9d5c4,#b58863)}
  .grad-4{background:linear-gradient(135deg,#2b2b2b,#4b3a2a)}
  .grad-5{background:linear-gradient(135deg,#a7d9a7,#3f8f52)}
  .grad-6{background:linear-gradient(135deg,#7b4b2a,#3e2a1a)}
  .grad-7{background:linear-gradient(135deg,#fde68a,#f59e0b)}
  .grad-8{background:linear-gradient(135deg,#fcd7a1,#e58e26)}
  .grad-9{background:linear-gradient(135deg,#c68a52,#6b3a1a)}
  .grad-10{background:linear-gradient(135deg,#ffe08a,#f2a900)}
  .grad-11{background:linear-gradient(135deg,#f5deb3,#c9a26b)}
  .grad-12{background:linear-gradient(135deg,#6b3a2a,#2c1810)}

  /* Focus mode */
  body.focus-mode #sidebar{display:none !important}
  body.focus-mode #mainWrap{padding-left:0 !important}

  /* Sidebar collapsed */
  #sidebar.collapsed{width:72px}
  #sidebar.collapsed .side-label,#sidebar.collapsed .side-logo-text{display:none}
  #sidebar.collapsed .side-item{justify-content:center}

  /* Print */
  @media print{
    body *{visibility:hidden}
    #receiptPrintArea,#receiptPrintArea *{visibility:visible}
    #receiptPrintArea{position:absolute;left:0;top:0;width:100%}
    .no-print{display:none !important}
  }

  /* Scan animation */
  .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#2f9761,transparent);animation:scan 1.8s linear infinite}
  @keyframes scan{0%{top:0}100%{top:100%}}

  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input[type=number]{-moz-appearance:textfield}
</style>

$('#fullscreenBtn').onclick = toggleFocus;

  const on = document.body.classList.toggle('focus-mode');

  btn.innerHTML = on
    ? '<i data-lucide="minimize-2" class="w-5 h-5"></i>'
    : '<i data-lucide="maximize-2" class="w-5 h-5"></i>';

    if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
  }else{
    if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  }
  icons();
}

  if(!permissions.shift) $('#shiftBadge')?.remove();
  if(!permissions.holdOrder) $('#holdOrderBtn')?.remove();
}
applyPermissions();

        <span class="font-medium">Meja</span>
        <span class="font-bold text-slate-900">${state.table}</span>
      </button>`;
    setTimeout(()=>{ icons(); $('#tableBtn').onclick = openTableModal; },0);
  } else if(state.orderType === 'takeaway'){

/* ===================== CART ===================== */
function addToCartSimple(p){
  const existing = state.cart.find(c=>c.productId===p.id && !c.modifiers);
  if(existing){ existing.qty++; }
  else state.cart.push({uid:uid(), productId:p.id, name:p.name, unitPrice:p.price, price:p.price, qty:1, modifiers:null, note:''});
  renderCart();
}
function addToCartWithMod(p, mod, qty, note){
  let add = 0;
  if(mod.size==='Large') add+=4000;
  mod.addons.forEach(a=>add+=a.price);
  const unit = p.price+add;
  state.cart.push({uid:uid(), productId:p.id, name:p.name, unitPrice:unit, price:unit, qty, modifiers:mod, note});
  renderCart();
}
function removeItem(u){ state.cart = state.cart.filter(c=>c.uid!==u); renderCart(); }
function changeQty(u,d){
  const it = state.cart.find(c=>c.uid===u); if(!it) return;
  it.qty += d; if(it.qty<=0) removeItem(u); else renderCart();
}

function calcTotals(){
  const subtotal = state.cart.reduce((s,c)=>s+c.unitPrice*c.qty, 0);
  let discount = 0;
  if(state.discount){
    discount = state.discount.type==='percent' ? Math.round(subtotal*state.discount.value/100) : state.discount.value;
  }
  const taxable = Math.max(subtotal-discount,0);
  const tax = Math.round(taxable*state.taxRate);
  const service = Math.round(taxable*state.serviceRate);
  const total = taxable+tax+service;
  return {subtotal, discount, tax, service, total};
}

  `,{size:'lg'});

  let qty = initQty;
  function computeTotal(){
    let unit = p.price;
    if(mod.size==='Large') unit+=4000;
    mod.addons.forEach(a=>unit+=a.price);
    $('#modTotal').textContent = fmt(unit*qty);
  }

    mod.size=e.target.value;
    m.querySelectorAll('label').forEach(l=>{}); // simple; visuals update on reopen
    e.target.closest('div.grid').querySelectorAll('label').forEach(l=>l.className='cursor-pointer border-2 rounded-xl p-3 flex items-center justify-between border-slate-200 hover:border-slate-300');

  m.querySelectorAll('input[name=ice]').forEach(r=>r.onchange=e=>{
    mod.ice=e.target.value;

    e.target.closest('label').className='cursor-pointer border-2 rounded-xl p-2.5 text-center text-sm border-brand-500 bg-brand-50 text-brand-700 font-semibold';

  m.querySelectorAll('input[name=sugar]').forEach(r=>r.onchange=e=>{
    mod.sugar=e.target.value;
    e.target.closest('div.grid').querySelectorAll('label').forEach(l=>l.className='cursor-pointer border-2 rounded-xl p-2.5 text-center text-sm border-slate-200');
    e.target.closest('label').className='cursor-pointer border-2 rounded-xl p-2.5 text-center text-sm border-brand-500 bg-brand-50 text-brand-700 font-semibold';
  });
  m.querySelectorAll('input[data-addon]').forEach(c=>c.onchange=e=>{
    const name = e.target.dataset.addon, price=+e.target.dataset.price;
    if(e.target.checked) mod.addons.push({name,price});
    else mod.addons = mod.addons.filter(x=>x.name!==name);
    e.target.closest('label').className = e.target.checked
      ? 'flex items-center justify-between border rounded-xl p-3 cursor-pointer border-brand-500 bg-brand-50'
      : 'flex items-center justify-between border rounded-xl p-3 cursor-pointer border-slate-200 hover:border-slate-300';
    computeTotal();
  });
  $('#qMinus').onclick = ()=>{ qty=Math.max(1,qty-1); $('#qVal').textContent=qty; computeTotal(); };
  $('#qPlus').onclick = ()=>{ qty++; $('#qVal').textContent=qty; computeTotal(); };
  $('#addBtn').onclick = ()=>{
    const note = $('#itemNote').value;
    if(existing){
      existing.modifiers = mod; existing.qty=qty; existing.note=note;
      let unit = p.price + (mod.size==='Large'?4000:0);
      mod.addons.forEach(a=>unit+=a.price);
      existing.unitPrice = unit;
      renderCart();
    } else addToCartWithMod(p, mod, qty, note);
    closeAllModals();
  };
}

function updateConfirmBtn(amount){
  const btn = $('#confirmPayBtn'); if(!btn) return;
  let ok = false;
  if(state.selectedMethod==='Tunai') ok = state.cashReceived >= amount;
  else if(state.selectedMethod) ok = true;
  btn.disabled = !ok;
  btn.onclick = ()=>{
    const paid = state.selectedMethod==='Tunai' ? state.cashReceived : amount;
    if(state.splitPayments.length>0 || paid<calcTotals().total){
      // add to splits
      state.splitPayments.push({method:state.selectedMethod, amount:Math.min(paid,amount)});
      const totalPaid = state.splitPayments.reduce((s,p)=>s+p.amount,0);
      if(totalPaid >= calcTotals().total) finishPayment();
      else { state.selectedMethod=null; state.cashReceived=0; renderPaymentModal(); }
    } else finishPayment();
  };
}

function addSplit(){
  const t = calcTotals();
  const paid = state.splitPayments.reduce((s,p)=>s+p.amount,0);
  if(paid>=t.total){ alert('Total sudah terpenuhi'); return; }
  if(!state.selectedMethod){ alert('Pilih metode terlebih dahulu untuk memulai split'); return; }
  // Prompt amount
  const remaining = t.total - paid;
  const amt = +prompt(`Nominal untuk ${state.selectedMethod} (Sisa: ${fmt(remaining)})`, remaining)||0;
  if(amt<=0) return;
  state.splitPayments.push({method:state.selectedMethod, amount:Math.min(amt,remaining)});
  state.selectedMethod=null; state.cashReceived=0;
  renderPaymentModal();
}

function finishPayment(){
  const t = calcTotals();
  const method = state.splitPayments.length>0 ? 'Split ('+state.splitPayments.map(p=>p.method).join(', ')+')' : state.selectedMethod;
  const paid = state.splitPayments.length>0 ? state.splitPayments.reduce((s,p)=>s+p.amount,0) : (state.selectedMethod==='Tunai' ? state.cashReceived : t.total);
  const change = Math.max(paid - t.total, 0);
  const trxNo = 'TRX-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'-'+state.orderNo.replace('ORD-','');
  const now = new Date();
  const dateStr = now.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}) + ' • ' + now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

  closeAllModals();
  const snapshot = { cart:[...state.cart], totals:t, method, paid, change, trxNo, dateStr, customer:state.customer, ctx:contextLine(), orderNo:state.orderNo };

  showModal(`
    <div class="p-6 text-center">
      <div class="mx-auto w-20 h-20 rounded-full bg-emerald-100 grid place-items-center mb-3">
        <i data-lucide="check-circle-2" class="w-12 h-12 text-emerald-600"></i>
      </div>
      <h3 class="text-xl font-extrabold text-slate-900">Pembayaran Berhasil</h3>
      <div class="mt-1 text-xs text-slate-500 font-mono">${trxNo}</div>

      <div class="mt-4 rounded-xl bg-slate-50 p-4 text-left text-sm space-y-1.5">
        <div class="flex justify-between"><span class="text-slate-500">Total</span><span class="font-bold">${fmt(t.total)}</span></div>
        <div class="flex justify-between"><span class="text-slate-500">Metode</span><span class="font-semibold">${method}</span></div>
        <div class="flex justify-between"><span class="text-slate-500">Dibayar</span><span class="font-semibold">${fmt(paid)}</span></div>
        ${change>0?`<div class="flex justify-between"><span class="text-slate-500">Kembalian</span><span class="font-semibold text-emerald-600">${fmt(change)}</span></div>`:''}
        <div class="flex justify-between"><span class="text-slate-500">Waktu</span><span class="text-xs">${dateStr}</span></div>
      </div>

      <button onclick="newTransaction()" class="mt-5 w-full py-3.5 rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-bold text-base flex items-center justify-center gap-2">
        <i data-lucide="plus-circle" class="w-5 h-5"></i>Transaksi Baru
      </button>

      <div class="mt-2 grid grid-cols-3 gap-2">
        <button onclick='showReceipt(${JSON.stringify(snapshot).replace(/'/g,"&#39;")})' class="py-2.5 rounded-xl border border-slate-200 text-sm font-medium hover:bg-slate-50 flex items-center justify-center gap-1"><i data-lucide="printer" class="w-4 h-4"></i>Cetak Struk</button>
        <button class="py-2.5 rounded-xl border border-slate-200 text-sm font-medium hover:bg-slate-50 flex items-center justify-center gap-1" data-tip="Bagikan Struk"><i data-lucide="share-2" class="w-4 h-4"></i>Bagikan</button>
        <button class="py-2.5 rounded-xl border border-slate-200 text-sm font-medium hover:bg-slate-50 flex items-center justify-center gap-1"><i data-lucide="chef-hat" class="w-4 h-4"></i>Ke Dapur</button>
      </div>
    </div>
  `,{size:'sm'});
  window._lastTrx = snapshot;
}

function showReceipt(s){
  s = s || window._lastTrx; if(!s) return;
  const html = `
    <div class="font-mono text-xs text-slate-800 max-w-[300px] mx-auto">
      <div class="text-center">
        <div class="font-bold text-sm">KOPI SENJA</div>
        <div>Cabang Banyuwangi</div>
      </div>
      <div class="mt-2">${s.dateStr}</div>
      <div>${s.trxNo}</div>
      <div>Kasir: Hanz</div>
      <div class="mt-1">${s.ctx}</div>
      <div class="border-t border-dashed border-slate-400 my-2"></div>
      ${s.cart.map(i=>{
        const modLine = i.modifiers?[i.modifiers.size,i.modifiers.ice,i.modifiers.sugar].filter(Boolean).join(', '):'';
        const addons = i.modifiers && i.modifiers.addons.length?i.modifiers.addons.map(a=>'+ '+a.name).join(', '):'';
        return `<div>
          <div>${i.name}</div>
          ${modLine?`<div class="text-slate-600">${modLine}</div>`:''}
          ${addons?`<div class="text-slate-600">${addons}</div>`:''}
          <div class="flex justify-between"><span>${i.qty} x ${fmt(i.unitPrice)}</span><span>${fmt(i.unitPrice*i.qty)}</span></div>
        </div>`;
      }).join('')}
      <div class="border-t border-dashed border-slate-400 my-2"></div>
      <div class="flex justify-between"><span>Subtotal</span><span>${fmt(s.totals.subtotal)}</span></div>
      ${s.totals.discount>0?`<div class="flex justify-between"><span>Diskon</span><span>-${fmt(s.totals.discount)}</span></div>`:''}
      <div class="flex justify-between"><span>Pajak</span><span>${fmt(s.totals.tax)}</span></div>
      <div class="flex justify-between"><span>Service</span><span>${fmt(s.totals.service)}</span></div>
      <div class="border-t border-dashed border-slate-400 my-2"></div>
      <div class="flex justify-between font-bold text-sm"><span>TOTAL</span><span>${fmt(s.totals.total)}</span></div>
      <div class="mt-1 flex justify-between"><span>${s.method}</span><span>${fmt(s.paid)}</span></div>
      ${s.change>0?`<div class="flex justify-between"><span>Kembali</span><span>${fmt(s.change)}</span></div>`:''}
      <div class="border-t border-dashed border-slate-400 my-2"></div>
      <div class="text-center">Terima kasih!</div>
    </div>`;
  $('#receiptPrintArea').innerHTML = html;
  const m = showModal(`
    <div class="p-4 border-b border-slate-100 flex items-center justify-between no-print">
      <h3 class="text-base font-bold">Preview Struk</h3>
      <button data-modal-close class="p-1.5 rounded hover:bg-slate-100"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <div class="p-4 bg-slate-100 overflow-y-auto">
      <div class="bg-white p-4 rounded-xl shadow-soft">${html}</div>
    </div>
    <div class="p-4 border-t border-slate-100 flex justify-end gap-2 no-print">
      <button data-modal-close class="px-4 py-2 rounded-xl border border-slate-200 text-sm">Tutup</button>
      <button onclick="window.print()" class="px-4 py-2 rounded-xl bg-brand-600 text-white text-sm font-semibold inline-flex items-center gap-1"><i data-lucide="printer" class="w-4 h-4"></i>Print</button>
    </div>`,{size:'sm'});
}

function newTransaction(){
  state.cart=[]; state.discount=null; state.orderNote=''; state.customer=null;
  state.selectedMethod=null; state.cashReceived=0; state.splitPayments=[];
  const num = parseInt(state.orderNo.split('-')[1])+1;
  state.orderNo = 'ORD-'+String(num).padStart(5,'0');
  closeAllModals(); renderCart(); updateCustomerLabel();
}

/* ===================== KEYBOARD ===================== */
document.addEventListener('keydown', e=>{
  const inField = ['INPUT','TEXTAREA'].includes(document.activeElement?.tagName);
  if(e.key==='Escape'){
    if($('#modalRoot').children.length>0) closeAllModals();
    else if(document.body.classList.contains('focus-mode')) toggleFocus();
    return;
  }
  if(inField) return;
  if(e.key==='F2'){ e.preventDefault(); $('#searchInput').focus(); }
  if(e.key==='F4'){ e.preventDefault(); openPayment(); }
  if(e.key==='F8' && permissions.holdOrder){ e.preventDefault(); holdOrder(); }
});

/* ===================== INIT ===================== */
renderOrderType();
renderCategories();
renderProducts();
renderCart();
updateHoldCount();
icons();
</script>
</body>
</html>
