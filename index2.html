<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Retail POS — Product Showcase</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
      colors: {
        ink: '#0A0A0B',
        paper: '#FAFAF7',
        brand: { 50:'#F0FDF4',100:'#DCFCE7',500:'#10B981',600:'#059669',700:'#047857' },
      },
      boxShadow: {
        soft: '0 1px 2px rgba(15,23,42,0.04), 0 8px 24px -8px rgba(15,23,42,0.08)',
        lift: '0 10px 40px -10px rgba(15,23,42,0.18)',
        ring: '0 0 0 4px rgba(16,185,129,0.15)',
      },
      animation: {
        'fade-in': 'fadeIn .25s ease-out both',
        'scale-in': 'scaleIn .28s cubic-bezier(.2,.9,.3,1.2) both',
        'slide-up': 'slideUp .35s cubic-bezier(.2,.9,.3,1) both',
      },
      keyframes: {
        fadeIn: { '0%':{opacity:0}, '100%':{opacity:1} },
        scaleIn: { '0%':{opacity:0, transform:'scale(.96) translateY(8px)'}, '100%':{opacity:1, transform:'scale(1) translateY(0)'} },
        slideUp: { '0%':{opacity:0, transform:'translateY(10px)'}, '100%':{opacity:1, transform:'translateY(0)'} },
      }
    }
  }
}
</script>
<style>
  html,body{font-family:'Inter',sans-serif;background:#FAFAF7;color:#0A0A0B;-webkit-font-smoothing:antialiased}
  .no-scrollbar::-webkit-scrollbar{display:none}
  .card-hover{transition: transform .35s cubic-bezier(.2,.9,.3,1), box-shadow .35s ease}
  .card-hover:hover{transform: translateY(-6px); box-shadow: 0 20px 50px -20px rgba(15,23,42,.22)}
  .img-zoom img{transition: transform .6s cubic-bezier(.2,.9,.3,1)}
  .img-zoom:hover img{transform: scale(1.06)}
  .chev{transition: transform .3s ease}
  .expanded .chev{transform: rotate(180deg)}
  .wholesale{max-height:0;overflow:hidden;transition:max-height .4s ease, opacity .3s ease, margin .3s ease; opacity:0}
  .expanded .wholesale{max-height:400px; opacity:1; margin-top:.75rem}
  .option-card{transition:all .2s ease}
  .option-card.selected{border-color:#10B981; background:linear-gradient(180deg,#F0FDF4, #ffffff); box-shadow:0 0 0 4px rgba(16,185,129,.12)}
  .option-card.selected .radio-dot{background:#10B981;border-color:#10B981}
  .option-card.selected .radio-dot svg{opacity:1;transform:scale(1)}
  .radio-dot svg{opacity:0;transform:scale(.5);transition:all .2s}
  .backdrop{background:rgba(10,10,11,.45); backdrop-filter: blur(6px);}
  .modal-panel{animation: scaleIn .3s cubic-bezier(.2,.9,.3,1.1) both}
  .fab{transition: transform .25s ease, box-shadow .25s ease}
  .fab:hover{transform: scale(1.08); box-shadow: 0 12px 30px -10px rgba(16,185,129,.55)}
  .fab:active{transform: scale(.96)}
  .qty-btn{transition: all .15s ease}
  .qty-btn:hover{background:#0A0A0B;color:#fff}
  .badge-grad{background:linear-gradient(135deg,#111827,#0A0A0B)}
  .chip{background:rgba(10,10,11,.045); border:1px solid rgba(10,10,11,.06)}
  .price-strike{text-decoration: line-through; color:#9CA3AF}
</style>
</head>
<body class="min-h-screen">

<main class="max-w-7xl mx-auto px-5 sm:px-8 lg:px-10 py-12 sm:py-16">
  <div class="mb-10 sm:mb-14">
    <div class="inline-flex items-center gap-2 chip px-3 py-1.5 rounded-full text-xs font-medium text-neutral-700">
      <span class="w-1.5 h-1.5 rounded-full bg-brand-500"></span> Retail POS · Product Catalog
    </div>
    <h1 class="mt-4 text-3xl sm:text-5xl font-bold tracking-tight text-ink">Today's Selection</h1>
    <p class="mt-3 text-neutral-500 max-w-xl">A curated grid of ready-to-scan items. Tap the plus to configure variants, units and quantity.</p>
  </div>

  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
</main>

<!-- Modal -->
<div id="modal" class="fixed inset-0 z-50 hidden items-end sm:items-center justify-center">
  <div class="backdrop absolute inset-0 animate-fade-in" onclick="closeModal()"></div>
  <div class="modal-panel relative w-full sm:max-w-lg bg-white sm:rounded-3xl rounded-t-3xl shadow-lift max-h-[92vh] flex flex-col overflow-hidden">
    <!-- Header -->
    <div class="flex items-start gap-4 p-6 border-b border-neutral-100">
      <div id="mProductImg" class="w-16 h-16 rounded-2xl bg-neutral-100 overflow-hidden shrink-0"></div>
      <div class="flex-1 min-w-0">
        <div class="text-xs text-neutral-500 font-medium" id="mProductSku"></div>
        <h3 class="text-lg font-semibold text-ink truncate" id="mProductName"></h3>
        <div class="mt-1 text-xs text-neutral-500" id="mProductDefault"></div>
      </div>
      <button onclick="closeModal()" class="w-9 h-9 rounded-full hover:bg-neutral-100 flex items-center justify-center text-neutral-500">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg>
      </button>
    </div>

    <!-- Body -->
    <div class="flex-1 overflow-y-auto no-scrollbar px-6 py-5 space-y-7">
      <!-- Variants -->
      <section id="secVariants" class="space-y-3 hidden">
        <div class="flex items-center justify-between">
          <h4 class="text-sm font-semibold text-ink">Choose Variant</h4>
          <span class="text-[11px] uppercase tracking-wider text-neutral-400 font-medium">Required</span>
        </div>
        <div id="variantList" class="space-y-2.5"></div>
      </section>

      <!-- Units -->
      <section class="space-y-3">
        <div class="flex items-center justify-between">
          <h4 class="text-sm font-semibold text-ink">Choose Unit</h4>
          <span class="text-[11px] uppercase tracking-wider text-neutral-400 font-medium">Required</span>
        </div>
        <div id="unitList" class="grid grid-cols-1 gap-2.5"></div>
      </section>

      <!-- Quantity -->
      <section class="space-y-3">
        <h4 class="text-sm font-semibold text-ink">Quantity</h4>
        <div class="flex items-center gap-3">
          <button onclick="changeQty(-1)" class="qty-btn w-11 h-11 rounded-2xl border border-neutral-200 flex items-center justify-center text-lg font-semibold">−</button>
          <input id="qtyInput" type="number" min="1" value="1" class="flex-1 h-11 rounded-2xl border border-neutral-200 text-center text-base font-semibold focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500" oninput="onQtyInput()"/>
          <button onclick="changeQty(1)" class="qty-btn w-11 h-11 rounded-2xl border border-neutral-200 flex items-center justify-center text-lg font-semibold">+</button>
        </div>
      </section>

      <!-- Notes -->
      <section class="space-y-3">
        <h4 class="text-sm font-semibold text-ink">Item Notes</h4>
        <textarea id="notesInput" rows="3" placeholder="Special request..." class="w-full rounded-2xl border border-neutral-200 p-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500"></textarea>
      </section>
    </div>

    <!-- Sticky footer -->
    <div class="border-t border-neutral-100 bg-white/80 backdrop-blur px-6 py-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-xs text-neutral-500 font-medium uppercase tracking-wider">Subtotal</span>
        <span id="subtotal" class="text-xl font-bold tracking-tight text-ink">Rp0</span>
      </div>
      <div class="flex gap-3">
        <button onclick="closeModal()" class="flex-1 h-12 rounded-2xl border border-neutral-200 font-semibold text-neutral-700 hover:bg-neutral-50 transition">Cancel</button>
        <button onclick="addToCart()" class="flex-[1.4] h-12 rounded-2xl bg-ink text-white font-semibold hover:bg-neutral-800 transition shadow-soft flex items-center justify-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-13z"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/><path d="M6 6L5 3H2"/></svg>
          Add to Cart
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-ink text-white text-sm px-5 py-3 rounded-full shadow-lift opacity-0 pointer-events-none transition-all duration-300 z-50">Added to cart</div>

<script>
const rupiah = n => 'Rp' + n.toLocaleString('id-ID');

const products = [
  {
    id:'p1', type:1, name:'Kopi Susu Gula Aren', sku:'SKU-KSGA-001', defaultUnit:'PCS',
    image:'https://images.unsplash.com/photo-1461988091159-192b6df7054f?w=800&auto=format&fit=crop',
    variants:[
      { name:'Regular 250ml', sku:'KSGA-250', price:18000, wholesale:[{min:10,price:17000},{min:24,price:16000},{min:50,price:15000}] },
      { name:'Large 500ml', sku:'KSGA-500', price:26000, wholesale:[{min:10,price:24500},{min:24,price:23000},{min:50,price:21500}] },
      { name:'Family 1L', sku:'KSGA-1L', price:48000, wholesale:[{min:6,price:45000},{min:12,price:42000}] },
    ],
    units:[{name:'PCS', ratio:1}]
  },
  {
    id:'p2', type:2, name:'Roti Sourdough Artisan', sku:'SKU-BRD-014', defaultUnit:'PCS', price:38000,
    image:'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=800&auto=format&fit=crop',
    units:[{name:'PCS', ratio:1, price:38000},{name:'BOX', ratio:6, price:210000, note:'1 BOX = 6 PCS'}]
  },
  {
    id:'p3', type:1, name:'Teh Melati Premium', sku:'SKU-TEH-208', defaultUnit:'PCS',
    image:'https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=800&auto=format&fit=crop',
    variants:[
      { name:'Sachet 25g', sku:'TEH-25', price:4500, wholesale:[{min:10,price:4200},{min:20,price:3900},{min:50,price:3700}] },
      { name:'Kaleng 100g', sku:'TEH-100', price:38000, wholesale:[{min:6,price:35000},{min:12,price:32000}] },
    ],
    units:[{name:'PCS', ratio:1},{name:'DOZEN', ratio:12, note:'1 DOZEN = 12 PCS'}]
  },
  {
    id:'p4', type:2, name:'Cokelat Belgia 70%', sku:'SKU-CHOC-092', defaultUnit:'PCS', price:65000,
    image:'https://images.unsplash.com/photo-1548907040-4d42bea7f7e0?w=800&auto=format&fit=crop',
    units:[{name:'PCS', ratio:1, price:65000},{name:'PACK', ratio:4, price:240000, note:'1 PACK = 4 PCS'},{name:'BOX', ratio:12, price:680000, note:'1 BOX = 12 PCS'}]
  },
  {
    id:'p5', type:1, name:'Beras Premium Organik', sku:'SKU-RICE-501', defaultUnit:'KG',
    image:'https://images.unsplash.com/photo-1586201375761-83865001e31c?w=800&auto=format&fit=crop',
    variants:[
      { name:'Pandan Wangi 5kg', sku:'RICE-PW5', price:82000, wholesale:[{min:5,price:78000},{min:10,price:75000},{min:20,price:72000}] },
      { name:'Rojolele 5kg', sku:'RICE-RJ5', price:78000, wholesale:[{min:5,price:74000},{min:10,price:71000}] },
      { name:'Basmati 2kg', sku:'RICE-BM2', price:64000, wholesale:[{min:6,price:60000},{min:12,price:57000}] },
    ],
    units:[{name:'BAG', ratio:1}]
  },
  {
    id:'p6', type:2, name:'Madu Hutan Murni', sku:'SKU-HNY-330', defaultUnit:'BOTTLE', price:95000,
    image:'https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=800&auto=format&fit=crop',
    units:[{name:'BOTTLE', ratio:1, price:95000},{name:'BOX', ratio:6, price:540000, note:'1 BOX = 6 BOTTLE'}]
  },
  {
    id:'p7', type:1, name:'Kaos Katun Signature', sku:'SKU-TEE-771', defaultUnit:'PCS',
    image:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800&auto=format&fit=crop',
    variants:[
      { name:'Size S · Black', sku:'TEE-S-BK', price:159000, wholesale:[{min:6,price:149000},{min:12,price:139000}] },
      { name:'Size M · Black', sku:'TEE-M-BK', price:159000, wholesale:[{min:6,price:149000},{min:12,price:139000}] },
      { name:'Size L · Cream', sku:'TEE-L-CR', price:169000, wholesale:[{min:6,price:159000},{min:12,price:149000}] },
    ],
    units:[{name:'PCS', ratio:1},{name:'PACK', ratio:3, note:'1 PACK = 3 PCS'}]
  },
  {
    id:'p8', type:2, name:'Air Mineral Pegunungan', sku:'SKU-WTR-020', defaultUnit:'PCS', price:5000,
    image:'https://images.unsplash.com/photo-1550505095-81378a674395?w=800&auto=format&fit=crop',
    units:[{name:'PCS', ratio:1, price:5000},{name:'PACK', ratio:12, price:55000, note:'1 PACK = 12 PCS'},{name:'BOX', ratio:24, price:102000, note:'1 BOX = 24 PCS'}]
  }
];

/* ---------- Render grid ---------- */
const grid = document.getElementById('grid');
products.forEach(p => grid.appendChild(cardEl(p)));

function cardEl(p){
  const el = document.createElement('article');
  el.className = 'card-hover group relative bg-white rounded-3xl p-4 shadow-soft border border-neutral-100 flex flex-col';
  const priceBlock = p.type === 1
    ? `<div class="mt-3 inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-semibold badge-grad text-white">
         <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 7L9 18l-5-5"/></svg>
         Has Variants
       </div>`
    : `<div class="mt-3 flex items-baseline gap-2">
         <span class="text-xl font-bold tracking-tight text-ink">${rupiah(p.price)}</span>
         <span class="text-xs text-neutral-400">/ ${p.defaultUnit}</span>
       </div>
       ${p.units.length>1 ? `<div class="mt-1.5 text-[11px] text-neutral-500">${p.units.filter(u=>u.note).map(u=>u.note).join(' · ')}</div>`:''}`;

  el.innerHTML = `
    <div class="img-zoom relative rounded-2xl overflow-hidden bg-neutral-100 aspect-square">
      <img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover" loading="lazy"/>
      <div class="absolute top-3 left-3 chip px-2 py-1 rounded-full text-[10px] font-semibold text-neutral-700 bg-white/80 backdrop-blur">${p.defaultUnit}</div>
      <button data-open="${p.id}" class="fab absolute bottom-3 right-3 w-11 h-11 rounded-full bg-ink text-white flex items-center justify-center shadow-lift">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <div class="pt-4 px-1 flex-1 flex flex-col">
      <div class="text-[11px] uppercase tracking-wider text-neutral-400 font-medium">${p.sku}</div>
      <h3 class="mt-1 text-[15px] font-semibold text-ink leading-snug line-clamp-2">${p.name}</h3>
      ${priceBlock}
    </div>
  `;
  el.querySelector('[data-open]').addEventListener('click', () => openModal(p.id));
  return el;
}

/* ---------- Modal state ---------- */
let state = { product:null, variantIdx:null, unitIdx:0, qty:1 };

function openModal(id){
  const p = products.find(x=>x.id===id);
  state = { product:p, variantIdx:null, unitIdx:0, qty:1 };
  document.getElementById('mProductImg').innerHTML = `<img src="${p.image}" class="w-full h-full object-cover"/>`;
  document.getElementById('mProductName').textContent = p.name;
  document.getElementById('mProductSku').textContent = p.sku;
  document.getElementById('mProductDefault').textContent = `Default: ${p.defaultUnit}`;
  document.getElementById('qtyInput').value = 1;
  document.getElementById('notesInput').value = '';

  const secV = document.getElementById('secVariants');
  if (p.type === 1) { secV.classList.remove('hidden'); renderVariants(); }
  else { secV.classList.add('hidden'); }

  renderUnits();
  updateSubtotal();

  const m = document.getElementById('modal');
  m.classList.remove('hidden'); m.classList.add('flex');
  document.body.style.overflow='hidden';
}
function closeModal(){
  const m = document.getElementById('modal');
  m.classList.add('hidden'); m.classList.remove('flex');
  document.body.style.overflow='';
}

function renderVariants(){
  const list = document.getElementById('variantList');
  list.innerHTML = '';
  state.product.variants.forEach((v,i) => {
    const wrap = document.createElement('div');
    wrap.className = 'option-card border border-neutral-200 rounded-2xl overflow-hidden bg-white';
    wrap.innerHTML = `
      <div class="p-4 flex items-center gap-3 cursor-pointer select-none">
        <div class="radio-dot w-5 h-5 rounded-full border-2 border-neutral-300 flex items-center justify-center shrink-0">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"><path d="M20 7L9 18l-5-5"/></svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-[15px] font-semibold text-ink truncate">${v.name}</div>
          <div class="text-[11px] text-neutral-500 mt-0.5">${v.sku}</div>
        </div>
        <div class="text-right">
          <div class="text-[15px] font-bold text-ink">${rupiah(v.price)}</div>
          <div class="text-[10px] text-neutral-400 uppercase tracking-wider">retail</div>
        </div>
        <button class="chev-btn w-8 h-8 rounded-full hover:bg-neutral-100 flex items-center justify-center text-neutral-500 shrink-0">
          <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
      <div class="wholesale px-4 pb-4">
        <div class="rounded-xl bg-neutral-50 border border-neutral-100 p-3">
          <div class="text-[10px] uppercase tracking-wider text-neutral-500 font-semibold mb-2">Wholesale Tiers</div>
          <div class="space-y-1.5">
            ${v.wholesale.map(w=>`
              <div class="flex items-center justify-between text-sm">
                <span class="text-neutral-600">${w.min}+ pcs</span>
                <span class="font-semibold text-brand-700">${rupiah(w.price)}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
    `;
    wrap.querySelector('.p-4').addEventListener('click', e => {
      if (e.target.closest('.chev-btn')) return;
      state.variantIdx = i;
      [...list.children].forEach(c=>c.classList.remove('selected'));
      wrap.classList.add('selected');
      updateSubtotal();
    });
    wrap.querySelector('.chev-btn').addEventListener('click', e => {
      e.stopPropagation();
      wrap.classList.toggle('expanded');
    });
    list.appendChild(wrap);
  });
}

function renderUnits(){
  const list = document.getElementById('unitList');
  list.innerHTML = '';
  const p = state.product;
  const units = p.units;
  units.forEach((u,i) => {
    const price = p.type === 2 ? u.price : null;
    const el = document.createElement('div');
    el.className = 'option-card border border-neutral-200 rounded-2xl p-4 cursor-pointer flex items-center gap-3 bg-white';
    el.innerHTML = `
      <div class="radio-dot w-5 h-5 rounded-full border-2 border-neutral-300 flex items-center justify-center shrink-0">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"><path d="M20 7L9 18l-5-5"/></svg>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-[15px] font-semibold text-ink">${u.name}</div>
        ${u.note ? `<div class="text-[11px] text-neutral-500 mt-0.5">${u.note}</div>`:''}
      </div>
      ${price!==null ? `<div class="text-[15px] font-bold text-ink">${rupiah(price)}</div>`:''}
    `;
    el.addEventListener('click', () => {
      state.unitIdx = i;
      [...list.children].forEach(c=>c.classList.remove('selected'));
      el.classList.add('selected');
      updateSubtotal();
    });
    list.appendChild(el);
    if (i===0) el.classList.add('selected');
  });
  state.unitIdx = 0;
}

function changeQty(delta){
  const inp = document.getElementById('qtyInput');
  let v = parseInt(inp.value||'1',10) + delta;
  if (v<1) v=1;
  inp.value = v;
  state.qty = v;
  updateSubtotal();
}
function onQtyInput(){
  const inp = document.getElementById('qtyInput');
  let v = parseInt(inp.value||'1',10);
  if (isNaN(v)||v<1) v=1;
  state.qty = v;
  updateSubtotal();
}

function currentUnitPrice(){
  const p = state.product;
  const qty = state.qty;
  if (p.type === 1){
    if (state.variantIdx===null) return 0;
    const v = p.variants[state.variantIdx];
    const unit = p.units[state.unitIdx];
    let price = v.price;
    // apply wholesale tiers by qty
    const tiers = [...(v.wholesale||[])].sort((a,b)=>a.min-b.min);
    for (const t of tiers) if (qty >= t.min) price = t.price;
    return price * (unit?.ratio||1);
  } else {
    const u = p.units[state.unitIdx];
    return u.price;
  }
}
function updateSubtotal(){
  const total = currentUnitPrice() * state.qty;
  document.getElementById('subtotal').textContent = rupiah(total);
}

function addToCart(){
  if (state.product.type===1 && state.variantIdx===null){
    toast('Please select a variant');
    return;
  }
  closeModal();
  toast('Added to cart');
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = 1; t.style.transform = 'translate(-50%, -6px)';
  clearTimeout(t._to);
  t._to = setTimeout(()=>{ t.style.opacity = 0; t.style.transform='translate(-50%,0)'; }, 1800);
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
</script>
</body>
</html>
