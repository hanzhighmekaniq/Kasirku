<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Nova POS · Enterprise Cashier</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'] },
      colors: {
        ink: { 50:'#f7f8fa',100:'#eef0f4',200:'#e2e6ec',300:'#cbd2dc',400:'#8b95a5',500:'#5b6675',600:'#3d4757',700:'#28303c',800:'#1a2029',900:'#0f141b' },
        brand: { 50:'#eef4ff',100:'#dbe6ff',500:'#3b6bff',600:'#2f56e6',700:'#2646bf' },
      },
      boxShadow: {
        soft: '0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.05)',
        softlg: '0 10px 24px -12px rgba(16,24,40,.18), 0 4px 8px -4px rgba(16,24,40,.06)',
      }
    }
  }
}
</script>
<style>
  html,body{font-family:'Inter',sans-serif;background:#f7f8fa;color:#1a2029;}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#e2e6ec;border-radius:8px}
  .no-scrollbar::-webkit-scrollbar{display:none}
  .tab-btn.active{background:#1a2029;color:#fff;box-shadow:0 1px 2px rgba(16,24,40,.06)}
  .tab-btn.active .hint{color:rgba(255,255,255,.65)}
  .view{display:none}
  .view.active{display:flex}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:500}
  .kbd{font-size:10.5px;font-weight:500;color:#5b6675;background:#fff;border:1px solid #e2e6ec;border-radius:4px;padding:1px 6px}
  .pulse-dot{box-shadow:0 0 0 0 rgba(16,185,129,.6);animation:pulse 2s infinite}
  @keyframes pulse {70%{box-shadow:0 0 0 8px rgba(16,185,129,0)}100%{box-shadow:0 0 0 0 rgba(16,185,129,0)}}
</style>
</head>
<body class="min-h-screen">
<!-- ===================== APP SHELL ===================== -->
<div class="flex min-h-screen">
  <!-- ============ SIDEBAR ============ -->
  <aside class="w-[248px] shrink-0 border-r border-ink-200 bg-white flex flex-col sticky top-0 h-screen">
    <div class="px-5 pt-5 pb-4">
      <div class="flex items-center gap-2.5">
        <div class="h-9 w-9 rounded-xl bg-ink-900 text-white grid place-items-center shadow-soft">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16M4 12h16M4 19h10"/></svg>
        </div>
        <div>
          <div class="text-[15px] font-semibold tracking-tight">Nova POS</div>
          <div class="text-[11px] text-ink-500">Enterprise · v4.2</div>
        </div>
      </div>
    </div>
    <div class="px-3">
      <div class="text-[10px] uppercase tracking-[0.14em] text-ink-500 px-3 pb-2 pt-2 font-medium">Business Modes</div>
      <nav id="modeNav" class="flex flex-col gap-0.5"></nav>
      <div class="text-[10px] uppercase tracking-[0.14em] text-ink-500 px-3 pb-2 pt-5 font-medium">Workspace</div>
      <nav class="flex flex-col gap-0.5">
        <button class="flex items-center gap-3 rounded-lg px-3 py-1.5 text-[13px] text-ink-600 hover:bg-ink-50"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Dashboard</button>
        <button class="flex items-center gap-3 rounded-lg px-3 py-1.5 text-[13px] text-ink-600 hover:bg-ink-50"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 15l4-4 4 3 5-6"/></svg>Reports</button>
        <button class="flex items-center gap-3 rounded-lg px-3 py-1.5 text-[13px] text-ink-600 hover:bg-ink-50"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8l-9-4-9 4v8l9 4 9-4z"/><path d="M3 8l9 4 9-4"/><path d="M12 12v10"/></svg>Inventory</button>
        <button class="flex items-center gap-3 rounded-lg px-3 py-1.5 text-[13px] text-ink-600 hover:bg-ink-50"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Customers</button>
      </nav>
    </div>
    <div class="mt-auto p-3">
      <div class="rounded-xl border border-ink-200 bg-white p-3">
        <div class="flex items-center gap-2 text-[12px] font-medium"><span class="h-2 w-2 rounded-full bg-emerald-500 pulse-dot"></span>Terminal · T-04 online</div>
        <div class="text-[11px] text-ink-500 mt-1">Store #221 · Downtown</div>
      </div>
    </div>
  </aside>
  <!-- ============ MAIN COLUMN ============ -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Topbar -->
    <header class="h-16 border-b border-ink-200 bg-white/80 backdrop-blur px-6 flex items-center gap-4 sticky top-0 z-10">
      <div>
        <div id="topSub" class="text-[11px] uppercase tracking-[0.14em] text-ink-500 font-medium">Point of Sale</div>
        <h1 id="topTitle" class="text-[17px] font-semibold tracking-tight leading-none mt-1">Retail Cashier</h1>
      </div>
      <div class="flex-1 max-w-xl mx-6">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-ink-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
          <input placeholder="Search products, orders, customers…" class="w-full h-10 pl-10 pr-16 rounded-xl bg-ink-50 border border-transparent focus:border-ink-200 focus:bg-white text-[13px] outline-none transition-all" />
          <span class="kbd absolute right-3 top-1/2 -translate-y-1/2">⌘K</span>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button class="h-9 px-3 rounded-lg border border-ink-200 text-[12px] font-medium hover:bg-ink-50 flex items-center gap-1.5"><svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>New Order</button>
        <button class="h-9 w-9 grid place-items-center rounded-lg hover:bg-ink-50 text-ink-500"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg></button>
        <button class="h-9 w-9 grid place-items-center rounded-lg hover:bg-ink-50 text-ink-500 relative"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="absolute top-2 right-2 h-1.5 w-1.5 rounded-full bg-rose-500"></span></button>
        <button class="h-9 w-9 grid place-items-center rounded-lg hover:bg-ink-50 text-ink-500"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg></button>
        <div class="h-6 w-px bg-ink-200 mx-1"></div>
        <div class="flex items-center gap-2.5 pr-1">
          <div class="h-9 w-9 rounded-full bg-gradient-to-br from-indigo-400 to-fuchsia-500 grid place-items-center text-white text-[12px] font-semibold shadow-soft">SA</div>
          <div class="leading-tight">
            <div class="text-[12.5px] font-semibold">Sarah Adeline</div>
            <div class="text-[10.5px] text-ink-500">Cashier · Shift PM</div>
          </div>
        </div>
      </div>
    </header>
    <!-- Workspace + Right rail -->
    <div class="flex flex-1 min-w-0">
      <main id="workspace" class="flex-1 min-w-0 p-6 overflow-auto"></main>
      <aside id="rightRail" class="w-[380px] shrink-0 border-l border-ink-200 bg-white flex flex-col sticky top-16 h-[calc(100vh-4rem)]"></aside>
    </div>
  </div>
</div>
<!-- ===================== TEMPLATES ===================== -->
<script>
// --- Business modes ---
const modes = [
  { id:'retail',      label:'Retail',           hint:'Grocery · Fashion',     icon:'M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0' },
  { id:'food',        label:'Food & Beverage',  hint:'Restaurant · Café',     icon:'M3 2v7a4 4 0 0 0 8 0V2M7 2v20M21 15V2s-4 1-4 8v5h4v7' },
  { id:'service',     label:'Service',          hint:'Salon · Barbershop',    icon:'M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6-9.9 9.9-2 .7.7-2 9.9-9.9 1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.9 6.9a2.12 2.12 0 0 1-3-3l6.9-6.9a6 6 0 0 1 7.94-7.94l-3.76 3.76z' },
  { id:'rental',      label:'Rental',           hint:'Car · Camera',          icon:'M3 4h18v4H3zM3 8v12h18V8M8 12h8M8 16h5' },
  { id:'ticketing',   label:'Ticketing',        hint:'Cinema · Concert',      icon:'M3 7v3a2 2 0 0 1 0 4v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3a2 2 0 0 1 0-4V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2zM13 5v14' },
  { id:'hospitality', label:'Hospitality',      hint:'Hotel · Villa',         icon:'M2 20h20M4 20V10l8-6 8 6v10M9 20v-6h6v6' },
  { id:'parking',     label:'Parking',          hint:'Lot management',        icon:'M14 6H5v12h9a4 4 0 0 0 0-8H5' },
  { id:'session',     label:'Session',          hint:'PS · Karaoke',          icon:'M6 12h4M8 10v4M15 13h.01M18 11h.01M17 4a5 5 0 0 1 5 5v6a4 4 0 0 1-7.55 1.79A4 4 0 0 1 7 15H5a4 4 0 0 1-3-6.71A5 5 0 0 1 7 4z' },
];
const titles = {
  retail: ['Point of Sale','Retail Cashier'],
  food: ['Restaurant POS','Table & Kitchen'],
  service: ['Service Bookings','Salon & Workshop'],
  rental: ['Rental Desk','Equipment & Vehicles'],
  ticketing: ['Box Office','Events & Seats'],
  hospitality: ['Front Desk','Rooms & Reservations'],
  parking: ['Gate Control','Slots & Vehicles'],
  session: ['Session Manager','Rooms & Timers'],
};
// --- Sidebar render ---
const nav = document.getElementById('modeNav');
modes.forEach(m => {
  const b = document.createElement('button');
  b.dataset.mode = m.id;
  b.className = 'tab-btn group flex items-center gap-3 rounded-lg px-3 py-2 text-[13px] text-ink-600 hover:bg-ink-50 transition-all text-left';
  b.innerHTML = `
    <svg class="h-[15px] w-[15px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${m.icon}"/></svg>
    <div class="flex-1">
      <div class="font-medium leading-tight">${m.label}</div>
      <div class="hint text-[10.5px] leading-tight mt-0.5 text-ink-500">${m.hint}</div>
    </div>`;
  b.onclick = () => setMode(m.id);
  nav.appendChild(b);
});
// --- Shared helpers ---
const money = n => '$' + n.toFixed(2);
function chip(text, tone='default') {
  const map = {
    default:'bg-ink-100 text-ink-700',
    success:'bg-emerald-50 text-emerald-700 border border-emerald-100',
    warn:'bg-amber-50 text-amber-700 border border-amber-100',
    info:'bg-sky-50 text-sky-700 border border-sky-100',
    danger:'bg-rose-50 text-rose-700 border border-rose-100',
    brand:'bg-brand-50 text-brand-700 border border-brand-100',
  };
  return `<span class="chip ${map[tone]}">${text}</span>`;
}
function rightRail({customer, lines, extras=[], total, cta, hint, methods=['Cash','Card','QRIS','Wallet'], extraTop=''}) {
  const initials = customer.name.split(' ').map(s=>s[0]).slice(0,2).join('');
  const subtotal = lines.reduce((a,l)=>a+l.qty*l.price,0);
  const linesHtml = lines.map(l => `
    <div class="flex items-start gap-3 py-1.5">
      <div class="h-8 w-8 rounded-lg bg-ink-100 text-[11px] font-semibold grid place-items-center shrink-0">×${l.qty}</div>
      <div class="flex-1 min-w-0">
        <div class="text-[12.5px] font-medium leading-tight truncate">${l.name}</div>
        ${l.meta?`<div class="text-[10.5px] text-ink-500 mt-0.5 truncate">${l.meta}</div>`:''}
      </div>
      <div class="text-[12.5px] font-semibold tabular-nums">${money(l.qty*l.price)}</div>
    </div>`).join('');
  const extraHtml = extras.map(e => `<div class="flex items-center justify-between text-[12.5px]"><span class="text-ink-500">${e.label}</span><span class="tabular-nums font-medium ${e.accent||''}">${e.value}</span></div>`).join('');
  const methodsHtml = methods.map(m=>`<button class="h-9 rounded-lg border border-ink-200 text-[11px] font-medium hover:border-ink-900 hover:text-ink-900 transition-colors">${m}</button>`).join('');
  return `
    <div class="p-5 border-b border-ink-200">
      <div class="text-[10px] uppercase tracking-[0.14em] text-ink-500 font-medium">Customer</div>
      <div class="mt-2 flex items-center gap-3">
        <div class="h-11 w-11 rounded-full bg-gradient-to-br from-amber-300 to-rose-400 grid place-items-center text-white text-[13px] font-semibold shadow-soft">${initials}</div>
        <div class="flex-1">
          <div class="text-[13.5px] font-semibold leading-tight">${customer.name}</div>
          <div class="text-[11px] text-ink-500 mt-0.5">${customer.id} · ${customer.tier}</div>
        </div>
        <button class="text-[11px] font-medium text-brand-600 hover:underline">Change</button>
      </div>
    </div>
    <div class="flex-1 overflow-hidden flex flex-col">
      <div class="px-5 pt-4 pb-2 flex items-center justify-between">
        <div class="text-[10px] uppercase tracking-[0.14em] text-ink-500 font-medium">Order Summary</div>
        <div class="text-[11px] text-ink-500">${lines.length} items</div>
      </div>
      <div class="flex-1 overflow-y-auto px-5 space-y-1">
        ${extraTop}
        ${linesHtml}
      </div>
    </div>
    <div class="p-5 border-t border-ink-200 space-y-2">
      <div class="flex items-center justify-between text-[12.5px]"><span class="text-ink-500">Subtotal</span><span class="tabular-nums font-medium">${money(subtotal)}</span></div>
      ${extraHtml}
      <div class="pt-2 mt-2 border-t border-dashed border-ink-200 flex items-baseline justify-between">
        <span class="text-[12px] uppercase tracking-[0.14em] text-ink-500 font-medium">Total</span>
        <span class="text-[26px] font-semibold tracking-tight tabular-nums">${money(total)}</span>
      </div>
      <div class="grid grid-cols-4 gap-1.5 pt-2">${methodsHtml}</div>
      <button class="w-full h-12 mt-2 rounded-xl bg-ink-900 text-white font-semibold text-[14px] tracking-tight shadow-softlg hover:opacity-95 transition-opacity flex items-center justify-center gap-2">${cta}<span class="text-white/70 text-[12px] font-normal">⏎</span></button>
      ${hint?`<div class="text-[10.5px] text-ink-500 text-center pt-1">${hint}</div>`:''}
    </div>`;
}
function sectionHeader(title, hint, right='') {
  return `<div class="flex items-end justify-between mb-3"><div><div class="text-[15px] font-semibold tracking-tight">${title}</div>${hint?`<div class="text-[11.5px] text-ink-500 mt-0.5">${hint}</div>`:''}</div>${right}</div>`;
}
// ============================================================
// VIEW BUILDERS — each returns {main, right}
// ============================================================
const views = {};
// ---------- 1. RETAIL ----------
views.retail = () => {
  const cats = ['All','Groceries','Beverages','Snacks','Dairy','Bakery','Frozen','Household'];
  const prods = [
    {n:'Organic Bananas', p:2.49, u:'/kg',   c:'Fresh',    tag:'Best seller', color:'from-yellow-100 to-amber-200', ic:'🍌'},
    {n:'Sourdough Loaf',  p:5.20, u:'/pcs',  c:'Bakery',   tag:'-10%',        color:'from-orange-100 to-amber-200', ic:'🥖'},
    {n:'Whole Milk 1L',   p:3.10, u:'/ctn',  c:'Dairy',              color:'from-blue-50 to-sky-100',    ic:'🥛'},
    {n:'Free-range Eggs', p:6.80, u:'/dz',   c:'Dairy',              color:'from-amber-50 to-orange-100', ic:'🥚'},
    {n:'Cold Brew Can',   p:4.50, u:'/pcs',  c:'Beverages',tag:'New',color:'from-stone-100 to-neutral-200', ic:'☕'},
    {n:'Almond Butter',   p:9.90, u:'/jar',  c:'Snacks',             color:'from-amber-50 to-yellow-100', ic:'🥜'},
    {n:'Dark Chocolate',  p:4.20, u:'/bar',  c:'Snacks',   tag:'Bundle x3',color:'from-amber-100 to-rose-100', ic:'🍫'},
    {n:'Mineral Water 6P',p:5.99, u:'/pack', c:'Beverages',          color:'from-sky-50 to-blue-100', ic:'💧'},
    {n:'Cheddar Block',   p:8.40, u:'/pcs',  c:'Dairy',              color:'from-yellow-100 to-orange-200', ic:'🧀'},
    {n:'Granola Cereal',  p:7.25, u:'/box',  c:'Snacks',             color:'from-amber-100 to-yellow-200', ic:'🥣'},
    {n:'Basmati Rice 5kg',p:14.90,u:'/bag',  c:'Groceries',tag:'-5%', color:'from-neutral-100 to-stone-200', ic:'🍚'},
    {n:'Olive Oil 500ml', p:11.20,u:'/btl',  c:'Groceries',          color:'from-lime-100 to-emerald-100', ic:'🫒'},
  ];
  const catBtns = cats.map((c,i)=>`<button class="px-3.5 h-9 rounded-lg text-[12px] font-medium border ${i===0?'bg-ink-900 text-white border-ink-900':'border-ink-200 hover:bg-ink-50'}">${c}</button>`).join('');
  const cards = prods.map(p=>`
    <button class="group text-left rounded-2xl bg-white border border-ink-200 hover:border-ink-900 hover:shadow-softlg transition-all p-3 relative overflow-hidden">
      ${p.tag?`<span class="absolute top-2.5 right-2.5 chip bg-ink-900 text-white">${p.tag}</span>`:''}
      <div class="h-24 rounded-xl bg-gradient-to-br ${p.color} grid place-items-center text-4xl mb-3">${p.ic}</div>
      <div class="text-[10.5px] text-ink-500 uppercase tracking-wider font-medium">${p.c}</div>
      <div class="text-[13px] font-semibold mt-0.5 leading-tight">${p.n}</div>
      <div class="mt-2 flex items-baseline justify-between">
        <div class="text-[14px] font-semibold tabular-nums">${money(p.p)}<span class="text-[10.5px] text-ink-500 font-normal">${p.u}</span></div>
        <span class="h-6 w-6 rounded-full bg-ink-100 group-hover:bg-ink-900 group-hover:text-white grid place-items-center transition-colors">
          <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        </span>
      </div>
    </button>`).join('');
  const main = `
    <div class="flex items-center gap-3 mb-5">
      <div class="flex-1 relative">
        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 h-4 w-4 text-ink-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="2" height="16"/><rect x="7" y="4" width="1" height="16"/><rect x="10" y="4" width="3" height="16"/><rect x="15" y="4" width="1" height="16"/><rect x="18" y="4" width="3" height="16"/></svg>
        <input placeholder="Scan barcode or type SKU…  e.g. 8991002101234" class="w-full h-12 pl-11 pr-32 rounded-xl bg-white border border-ink-200 text-[13.5px] outline-none focus:border-ink-900 shadow-soft"/>
        <div class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-1.5">
          <span class="chip bg-emerald-50 text-emerald-700 border border-emerald-100"><span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>Scanner ready</span>
          <span class="kbd">F2</span>
        </div>

function setMode(id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.mode===id));
  const [sub, title] = titles[id];
  document.getElementById('topSub').textContent = sub;
  document.getElementById('topTitle').textContent = title;
  const v = views[id]();
  document.getElementById('workspace').innerHTML = v.main;
  document.getElementById('rightRail').innerHTML = v.right;
  window.scrollTo({top:0});
}
